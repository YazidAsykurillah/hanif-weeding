services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    networks:
      - hanif-wedding-network
      - web-gateway # Tambahkan ini

  # Nginx (Official Image)
  web-hanif-wedding:
    image: nginx:alpine
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hanif-wedding-network
      - web-gateway # Tambahkan ini

  # Database MySQL 8.0
  db:
    container_name: db-hanif-wedding
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=hanif_wedding
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_USER=yazid
      - MYSQL_PASSWORD=secret
    volumes:
      - db-data-hanif-wedding:/var/lib/mysql
    networks:
      - hanif-wedding-network
  # Tambahkan phpMyAdmin di sini
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_hanif_wedding
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "8093:80"
    networks:
      - hanif-wedding-network

networks:
  hanif-wedding-network:
    driver: bridge
  web-gateway: # Daftarkan network global di sini
    external: true

volumes:
  db-data-hanif-wedding: